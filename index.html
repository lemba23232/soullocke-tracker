<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Soullocke Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<h1 class="title">🔥 Soullocke Tracker</h1>

<div class="top">

  <div class="panel">
    <h2>Spieler 1</h2>
    <input id="p1" placeholder="Pokemon Spieler 1" />
  </div>

  <div class="panel center">
    <h2>Route</h2>
    <input id="route" placeholder="Route / Stadt" />
    <button onclick="addEntry()">➕ Eintragen</button>
  </div>

  <div class="panel">
    <h2>Spieler 2</h2>
    <input id="p2" placeholder="Pokemon Spieler 2" />
  </div>

</div>

<hr />

<div id="list"></div>

<script src="app.js"></script>

</body>
</html>
